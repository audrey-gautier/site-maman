<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Photos de Lou Pitchou Prats et Maison Prats : gîte, chambres, extérieur, piscine et spa." />
  <title>Photos — Lou Pitchou Prats et Maison Prats</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Photos</h1>
    <p class="sous-titre">Un aperçu en images</p>
  </header>

  <nav>
    <a href="index.html">Présentation</a>
    <a href="lou-pitchou-prats.html">🏡 Lou Pitchou Prats</a>
    <a href="#">🏡 Maison Prats</a>
    <a href="nous-situer.html">📍 Nous situer</a>
    <a href="calendrier.html">📅 Calendrier</a>
    <a href="photos.html" class="actif">📷 Photos</a>
  </nav>

  <main>
    <section id="photos">
      <h2>Galerie</h2>

      <div class="onglets" id="onglets-photos">
        <button type="button" data-cat="gite" class="actif">Gîte</button>
        <button type="button" data-cat="chambres">Chambres</button>
        <button type="button" data-cat="exterieur">Extérieur</button>
        <button type="button" data-cat="piscine">Piscine et SPA</button>
      </div>

      <div class="galerie" id="galerie"></div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <img id="lightbox-img" src="" alt="" />
  </div>

  <footer>
    <p>&copy; 2026 — Lou Pitchou Prats et Maison Prats</p>
  </footer>

  <script>
    // === À REMPLIR ===
    // Pour chaque catégorie, ajouter les photos sous la forme :
    //   { src: "nom-du-fichier.jpg", alt: "Description de la photo" }
    var galeries = {
      gite: [
        { src: "Gite/gite-01.jpg", alt: "Le gîte" },
        { src: "Gite/gite-02.jpg", alt: "Le gîte" },
        { src: "Gite/gite-03.jpg", alt: "Le gîte" },
        { src: "Gite/gite-04.jpg", alt: "Le gîte" },
        { src: "Gite/gite-05.jpg", alt: "Le gîte" },
        { src: "Gite/gite-06.jpg", alt: "Le gîte" },
        { src: "Gite/gite-07.jpg", alt: "Le gîte" },
        { src: "Gite/gite-08.jpg", alt: "Le gîte" },
        { src: "Gite/gite-09.jpg", alt: "Le gîte" },
        { src: "Gite/gite-10.jpg", alt: "Le gîte" },
        { src: "Gite/gite-11.jpg", alt: "Le gîte" }
      ],
      chambres:  [],
      exterieur: [],
      piscine:   []
    };

    var categorieActive = "gite";

    function afficheGalerie() {
      var galerie = document.getElementById("galerie");
      var photos = galeries[categorieActive];
      galerie.innerHTML = "";
      if (photos.length === 0) {
        var vide = document.createElement("p");
        vide.className = "galerie-vide";
        vide.textContent = "Photos à venir prochainement.";
        galerie.appendChild(vide);
        return;
      }
      for (var i = 0; i < photos.length; i++) {
        var img = document.createElement("img");
        img.src = photos[i].src;
        img.alt = photos[i].alt || "";
        galerie.appendChild(img);
      }
    }

    document.getElementById("onglets-photos").addEventListener("click", function (e) {
      if (e.target.tagName !== "BUTTON") return;
      categorieActive = e.target.getAttribute("data-cat");
      var boutons = this.querySelectorAll("button");
      for (var i = 0; i < boutons.length; i++) {
        boutons[i].classList.toggle("actif", boutons[i] === e.target);
      }
      afficheGalerie();
    });

    var lightbox = document.getElementById("lightbox");
    var lightboxImg = document.getElementById("lightbox-img");

    function ouvreLightbox(src, alt) {
      lightboxImg.src = src;
      lightboxImg.alt = alt || "";
      lightbox.classList.add("ouvert");
    }

    function fermeLightbox() {
      lightbox.classList.remove("ouvert");
      lightboxImg.src = "";
    }

    document.getElementById("galerie").addEventListener("click", function (e) {
      if (e.target.tagName === "IMG") {
        ouvreLightbox(e.target.src, e.target.alt);
      }
    });

    lightbox.addEventListener("click", fermeLightbox);

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") fermeLightbox();
    });

    afficheGalerie();
  </script>
</body>
</html>
