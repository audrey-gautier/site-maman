<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Photos de Lou Pitchou Prats et Maison Prats : gîte, chambres, extérieur, piscine et spa." />
  <title>Photos — Lou Pitchou Prats et Maison Prats</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Photos</h1>
    <p class="sous-titre">Un aperçu en images</p>
  </header>

  <nav>
    <a href="index.html">Présentation</a>
    <a href="lou-pitchou-prats.html">🏡 Lou Pitchou Prats</a>
    <a href="#">🏡 Maison Prats</a>
    <a href="tarifs.html">💶 Tarifs</a>
    <a href="nous-situer.html">📍 Nous situer</a>
    <a href="calendrier.html">📅 Calendrier</a>
    <a href="photos.html" class="actif">📷 Photos</a>
  </nav>

  <main>
    <section id="photos">
      <h2>Galerie</h2>

      <div class="onglets" id="onglets-photos">
        <button type="button" data-cat="gite" class="actif">Gîte</button>
        <button type="button" data-cat="chambres">Chambres</button>
        <button type="button" data-cat="exterieur">Extérieur</button>
        <button type="button" data-cat="piscine">Piscine et SPA</button>
        <button type="button" data-cat="petitdej">Petit déjeuner</button>
      </div>

      <div class="onglets sous-onglets" id="sous-onglets"></div>

      <div id="galerie-intro"></div>

      <div class="galerie" id="galerie"></div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <img id="lightbox-img" src="" alt="" />
  </div>

  <footer>
    <p>&copy; 2026 — Lou Pitchou Prats et Maison Prats</p>
  </footer>

  <template id="tpl-petitdej">
    <div class="menu-pdj">
      <h3 class="menu-pdj-titre">Choix du petit déjeuner</h3>
      <div class="menu-pdj-cols">
        <div>
          <h4>Boissons</h4>
          <ul>
            <li>Café noir ou au lait</li>
            <li>Thé</li>
            <li>Chocolat au lait</li>
            <li>Lait (chaud / froid)</li>
            <li>Oranges pressées</li>
          </ul>
        </div>
        <div>
          <h4>Mini viennoiseries</h4>
          <ul>
            <li>Chocolatine (pain au chocolat)</li>
            <li>Croissant</li>
            <li>Petit pain</li>
            <li>Pain de mie (grillé ou non)</li>
            <li>Pancakes maison</li>
          </ul>
        </div>
        <div>
          <h4>Autres</h4>
          <ul>
            <li>Yaourt</li>
            <li>Jambon de pays</li>
            <li>Fromage</li>
            <li>Œufs / Bacon</li>
          </ul>
        </div>
      </div>
    </div>
  </template>

  <script>
    // === À REMPLIR ===
    // Pour chaque catégorie, ajouter les photos sous la forme :
    //   { src: "nom-du-fichier.jpg", alt: "Description de la photo" }
    // === À REMPLIR ===
    //  - type "simple"  : { type: "simple",  photos: [ {src, alt}, ... ] }
    //  - type "groupes" : { type: "groupes", groupes: [ { nom, photos: [...] }, ... ] }
    var galeries = {
      gite: { type: "simple", photos: [
        { src: "Gite/gite-01.jpg", alt: "Le gîte" },
        { src: "Gite/gite-02.jpg", alt: "Le gîte" },
        { src: "Gite/gite-03.jpg", alt: "Le gîte" },
        { src: "Gite/gite-04.jpg", alt: "Le gîte" },
        { src: "Gite/gite-05.jpg", alt: "Le gîte" },
        { src: "Gite/gite-06.jpg", alt: "Le gîte" },
        { src: "Gite/gite-07.jpg", alt: "Le gîte" },
        { src: "Gite/gite-08.jpg", alt: "Le gîte" },
        { src: "Gite/gite-09.jpg", alt: "Le gîte" },
        { src: "Gite/gite-10.jpg", alt: "Le gîte" },
        { src: "Gite/gite-11.jpg", alt: "Le gîte" }
      ] },
      chambres: { type: "groupes", groupes: [
        { nom: "Chambre 1", photos: [
          { src: "Chambres/chambre1/chambre1-01.jpg", alt: "Chambre 1" },
          { src: "Chambres/chambre1/chambre1-02.jpg", alt: "Chambre 1" },
          { src: "Chambres/chambre1/chambre1-03.jpg", alt: "Chambre 1" },
          { src: "Chambres/chambre1/chambre1-04.jpg", alt: "Chambre 1" },
          { src: "Chambres/chambre1/chambre1-05.jpg", alt: "Chambre 1" }
        ] },
        { nom: "Chambre 2", photos: [
          { src: "Chambres/chambre2/chambre2-01.jpg", alt: "Chambre 2" },
          { src: "Chambres/chambre2/chambre2-02.jpg", alt: "Chambre 2" },
          { src: "Chambres/chambre2/chambre2-03.jpg", alt: "Chambre 2" },
          { src: "Chambres/chambre2/chambre2-04.jpg", alt: "Chambre 2" }
        ] }
      ] },
      exterieur: { type: "simple", photos: [
        { src: "exterieur/exterieur-01.jpg", alt: "Extérieur" },
        { src: "exterieur/exterieur-02.jpg", alt: "Extérieur" },
        { src: "exterieur/exterieur-03.jpg", alt: "Extérieur" },
        { src: "exterieur/exterieur-04.jpg", alt: "Extérieur" },
        { src: "exterieur/exterieur-05.jpg", alt: "Extérieur" },
        { src: "exterieur/exterieur-06.jpg", alt: "Extérieur" },
        { src: "exterieur/exterieur-08.jpg", alt: "Extérieur" },
        { src: "exterieur/exterieur-09.jpg", alt: "Extérieur" },
        { src: "exterieur/exterieur-10.jpg", alt: "Extérieur" }
      ] },
      piscine:   { type: "simple", photos: [] },
      petitdej:  { type: "simple", introTemplate: "tpl-petitdej", photos: [
        { src: "petit-dejeuner/petit-dejeuner-01.jpg", alt: "Petit déjeuner" }
      ] }
    };

    var categorieActive = "gite";
    var sousOngletActif = 0;

    function rendPhotos(photos) {
      var galerie = document.getElementById("galerie");
      galerie.innerHTML = "";
      if (!photos || photos.length === 0) {
        var vide = document.createElement("p");
        vide.className = "galerie-vide";
        vide.textContent = "Photos à venir prochainement.";
        galerie.appendChild(vide);
        return;
      }
      for (var i = 0; i < photos.length; i++) {
        var img = document.createElement("img");
        img.src = photos[i].src;
        img.alt = photos[i].alt || "";
        galerie.appendChild(img);
      }
    }

    function afficheGalerie() {
      var cat = galeries[categorieActive];
      var sous = document.getElementById("sous-onglets");
      var intro = document.getElementById("galerie-intro");
      sous.innerHTML = "";
      intro.innerHTML = "";
      if (cat.type === "groupes") {
        sous.style.display = "flex";
        cat.groupes.forEach(function (groupe, idx) {
          var b = document.createElement("button");
          b.type = "button";
          b.textContent = groupe.nom;
          if (idx === sousOngletActif) b.classList.add("actif");
          b.addEventListener("click", function () {
            sousOngletActif = idx;
            afficheGalerie();
          });
          sous.appendChild(b);
        });
        rendPhotos(cat.groupes[sousOngletActif].photos);
      } else {
        sous.style.display = "none";
        if (cat.introTemplate) {
          var tpl = document.getElementById(cat.introTemplate);
          if (tpl) intro.appendChild(tpl.content.cloneNode(true));
        }
        rendPhotos(cat.photos);
      }
    }

    document.getElementById("onglets-photos").addEventListener("click", function (e) {
      if (e.target.tagName !== "BUTTON") return;
      categorieActive = e.target.getAttribute("data-cat");
      sousOngletActif = 0;
      var boutons = this.querySelectorAll("button");
      for (var i = 0; i < boutons.length; i++) {
        boutons[i].classList.toggle("actif", boutons[i] === e.target);
      }
      afficheGalerie();
    });

    var lightbox = document.getElementById("lightbox");
    var lightboxImg = document.getElementById("lightbox-img");

    function ouvreLightbox(src, alt) {
      lightboxImg.src = src;
      lightboxImg.alt = alt || "";
      lightbox.classList.add("ouvert");
    }

    function fermeLightbox() {
      lightbox.classList.remove("ouvert");
      lightboxImg.src = "";
    }

    document.getElementById("galerie").addEventListener("click", function (e) {
      if (e.target.tagName === "IMG") {
        ouvreLightbox(e.target.src, e.target.alt);
      }
    });

    lightbox.addEventListener("click", fermeLightbox);

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") fermeLightbox();
    });

    afficheGalerie();
  </script>
</body>
</html>
